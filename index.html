<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Student Webpage</title>
</head>
<body>
    <h1>Welcome to the Student Webpage</h1>
    <p>Type something below and see it appear:</p>

    <input type="text" id="studentInput" placeholder="Write here">
    <button onclick="showMessage()">Submit</button>

    <p id="output"></p>

    <script>
        function showMessage() {
            var input = document.getElementById('studentInput').value;
            document.getElementById('output').innerText = "You typed: " + input;
        }
    </script>
</body>
</html>
